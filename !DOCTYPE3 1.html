                        onClick: () => setStep('quiz'),
                        className:"mt-16 px-16 py-6 bg-[#3f6a4f] text-white text-xl rounded-3xl hover:bg-[#2e5a44] transition-all"
                    }, "开始生长")
                );
            }

            // 测试页
            if (step === 'quiz') {
                return React.createElement('div', {className:"relative"},
                    React.createElement('div', {className:"page-number"}, `${currentQuestion + 1}/${QUESTIONS.length}`),
                    React.createElement('h2', {className:"question-title"}, QUESTIONS[currentQuestion].text),
                    React.createElement('div', {className:"space-y-4 mt-8"},
                        QUESTIONS[currentQuestion].options.map((opt, i) =>
                            React.createElement('button', {
                                key: i,
                                onClick: () => handleAnswer(opt.type),
                                className:"option-btn w-full text-left text-[17px] py-5 px-6"
                            }, opt.text)
                        )
                    ),
                    React.createElement('div', {className:"footer-logo"},
                        React.createElement('div', {className:"top"}, "Tropical Poetry Collection"),
                        React.createElement('div', {className:"middle"}, "热带诗集"),
                        React.createElement('div', {className:"bottom"}, "枝探天际，自成宇宙")
                    )
                );
            }

            // 结果页
            if (step === 'result' && result) {
                return React.createElement('div', {ref: captureRef, className:"max-w-[420px] mx-auto px-6 py-12"},
                    React.createElement('div', {className:"text-center mb-10"},
                        React.createElement('div', {className:"text-7xl mb-6"}, "🌱"),
                        React.createElement('h2', {className:"text-4xl font-light"}, result.name),
                        React.createElement('p', {className:"text-[#3f6a4f] mt-2"}, result.sub)
                    ),
                    React.createElement('div', {className:"bg-white rounded-3xl p-8 shadow"},
                        React.createElement('canvas', {ref: radarRef})
                    ),
                    React.createElement('div', {className:"mt-10 px-4"},
                        React.createElement('p', {className:"italic text-xl leading-relaxed highlight"}, `"${result.quote}"`),
                        React.createElement('div', {className:"mt-12"},
                            React.createElement('h4', {className:"font-bold text-lg mb-4 text-[#3f6a4f]"}, "详细解析"),
                            React.createElement('p', {className:"text-[15px] leading-relaxed"}, result.detailed)
                        ),
                        React.createElement('div', {className:"mt-10"},
                            React.createElement('h4', {className:"font-bold text-lg mb-4 text-[#3f6a4f]"}, "推荐阅读与观影"),
                            React.createElement('div', {className:"space-y-6"},
                                React.createElement('div', {},
                                    React.createElement('p', {className:"font-medium"}, "文学作品"),
                                    React.createElement('ul', {className:"text-sm mt-2 space-y-1"}, 
                                        result.books.map(book => React.createElement('li', {key:book}, book))
                                    )
                                ),
                                React.createElement('div', {},
                                    React.createElement('p', {className:"font-medium"}, "电影作品"),
                                    React.createElement('ul', {className:"text-sm mt-2 space-y-1"}, 
                                        result.movies.map(movie => React.createElement('li', {key:movie}, movie))
                                    )
                                )
                            )
                        )
                    ),
                    React.createElement('div', {className:"flex gap-4 mt-16"},
                        React.createElement('button', {
                            onClick: saveAsImage,
                            className:"flex-1 py-6 bg-[#3f6a4f] text-white rounded-3xl text-lg"
                        }, "保存我的精神坐标"),
                        React.createElement('button', {
                            onClick: handleRestart,
                            className:"flex-1 py-6 border border-[#3f6a4f] text-[#3f6a4f] rounded-3xl text-lg"
                        }, "重新开始")
                    ),
                    React.createElement('div', {className:"footer-logo"},
                        React.createElement('div', {className:"top"}, "Tropical Poetry Collection"),
                        React.createElement('div', {className:"middle"}, "热带诗集"),
                        React.createElement('div', {className:"bottom"}, "枝探天际，自成宇宙")
                    )
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
