                {text:"B. 很有可能，因为更早看透了不公的本质，愤怒更纯粹。", type:"B"},
                {text:"C. 关键不在于时间早晚，而在于是否接触到了科学的理论分析。", type:"C"},
                {text:"D. 觉醒是一个持续的过程，每个阶段都有不同的认知高度。", type:"D"}
            ]},
            {id:21, text:"你认为性别不平等的主要根源是：", options:[
                {text:"A. 法律制度的不健全和历史遗留的观念偏差。", type:"A"},
                {text:"B. 系统性的父权制压迫，旨在剥夺女性的身体和资源。", type:"B"},
                {text:"C. 资本主义生产关系下的阶级压迫，女性是“底层的底层”。", type:"C"},
                {text:"D. 生理性差异被过度政治化，导致了人为的社会隔阂。", type:"D"}
            ]},
            {id:22, text:"你最关注的性别议题是：", options:[
                {text:"A. 职场玻璃天花板与同工同酬。", type:"A"},
                {text:"B. 性暴力预防与女性身体的绝对自主。", type:"B"},
                {text:"C. 无偿家务劳动的社会化与补偿。", type:"C"},
                {text:"D. 多元性别认同与对传统性别二元论的挑战。", type:"D"}
            ]},
            {id:23, text:"如果有机会改变世界，你更愿意：", options:[
                {text:"A. 实现绝对的程序正义和机会平等。", type:"A"},
                {text:"B. 彻底解构父权逻辑，建立以女性视角为主导的新文明。", type:"B"},
                {text:"C. 消灭阶级差异，让资源按需分配，从根本上消除剥削。", type:"C"},
                {text:"D. 保持多样性，让每个人都能找到适合自己的生活生态位。", type:"D"}
            ]},
            {id:24, text:"如何看待对男友使用“夹子音”的行为？", options:[
                {text:"A. 调情手段而已，女性有表达可爱和温柔的自由。", type:"A"},
                {text:"B. 一种无意识的低幼化示弱，迎合了父权制的审美期待。", type:"B"},
                {text:"C. 情感劳动的表现，试图以此换取更多的情绪回馈或资源。", type:"C"},
                {text:"D. 只要自己觉得好玩，这就是一种声音的趣味实验。", type:"D"}
            ]},
            {id:25, text:"你最想看到的女性主角电影情节是？", options:[
                {text:"A. 女性通过拼搏最终在男性主导的领域获得至高荣誉。", type:"A"},
                {text:"B. 一群女性建立了一个没有男性的乌托邦社群。", type:"B"},
                {text:"C. 女性在看清生活真相后，依然热爱并努力建设社会。", type:"C"},
                {text:"D. 并没有特定情节，只要是真实、复杂、不被定义的女性即可。", type:"D"}
            ]},
            {id:26, text:"刷到“女人要对自己好一点，买个包奖励自己”时，你的内心OS：", options:[
                {text:"A. 没错，我有钱我任性，消费是我掌控生活的奖赏。", type:"A"},
                {text:"B. 消费主义圈套，再次将女性价值与物欲和外在绑定。", type:"B"},
                {text:"C. 资本家收割女性的常用话术，掩盖了更深层次的分配问题。", type:"C"},
                {text:"D. 偶尔买买挺快乐，但不能把它当成解决人生问题的药方。", type:"D"}
            ]},
            {id:27, text:"伴侣单方面享受你的“情绪价值”时，你会：", options:[
                {text:"A. 找他谈谈，要求他学会共情和对等付出。", type:"A"},
                {text:"B. 果断离开，拒绝在一段损耗自我的关系中当“情绪垃圾桶”。", type:"B"},
                {text:"C. 反思这段关系是否成了另一种形式的“家庭内部剥削”。", type:"C"},
                {text:"D. 策略性停止付出，观察他的反应，再决定下一步行动。", type:"D"}
            ]},
            {id:28, text:"关于“白幼瘦”审美和医美广告：", options:[
                {text:"A. 支持变美自由，医美是科技进步带给女性的选择权。", type:"A"},
                {text:"B. 这是对女性身体的暴力修剪，本质是审美上的奴役。", type:"B"},
                {text:"C. 这种审美增加了职场生存的隐形门槛，是残酷的内卷。", type:"C"},
                {text:"D. 审美应当多元，我更推崇健康、自然、有个性的美。", type:"D"}
            ]},
            {id:29, text:"社交媒体上女性对女性身材的吹捧（如“姐姐好辣”）：", options:[
                {text:"A. 是女性间打破雌竞、互相赞赏的温暖表现。", type:"A"},
                {text:"B. 仍未跳出男权审美框架，只是换了个夸赞者。", type:"B"},
                {text:"C. 表象是夸赞，内核可能包含对特定消费符号的崇拜。", type:"C"},
                {text:"D. 挺好的，这至少说明审美权在向女性群体内部转移。", type:"D"}
            ]},
            {id:30, text:"你幻想中的完美社会：", options:[
                {text:"A. 性别不再成为升学、求职和生活的任何阻碍。", type:"A"},
                {text:"B. “女性”成为一种骄傲的、具有强大生命力的主体力量。", type:"B"},
                {text:"C. 劳动不再分性别贵贱，所有人的生存压力都降到最低。", type:"C"},
                {text:"D. 不存在“完美社会”，只有不断博弈、不断进化的平衡。", type:"D"}
            ]},
            {id:31, text:"职场遇到“女性太情绪化”的论调，你会：", options:[
                {text:"A. 用优秀的业绩直接打脸，证明这种偏见是错的。", type:"A"},
                {text:"B. 严厉反驳，指出这是典型的性别歧视和刻板印象。", type:"B"},
                {text:"C. 分析这种论调背后的权力结构，联合同事共同抵制。", type:"C"},
                {text:"D. 反问：“你这种基于偏见的断言，算不算一种情绪化？”", type:"D"}
            ]},
            {id:32, text:"你是否想过生一个孩子？", options:[
                {text:"A. 想过，前提是事业和家庭能平衡，且有好的物质条件。", type:"A"},
                {text:"B. 拒绝生育，不愿让身体和人生被生育行为所束缚。", type:"B"},
                {text:"C. 如果社会能提供更好的养育支持体系，我会考虑。", type:"C"},
                {text:"D. 生不生由我决定，这取决于我当时对生命的感悟。", type:"D"}
            ]},
            {id:33, text:"“女权”这个词在你眼里：", options:[
                {text:"A. 是追求平等权利的旗帜，虽然常被误解但很正当。", type:"A"},
                {text:"B. 是战斗的号角，必须大声喊出来，对抗失声。", type:"B"},
                {text:"C. 是分析社会的工具，帮我们看清权力运行的本质。", type:"C"},
                {text:"D. 是一个标签，重要的一直是行动，而不是名字。", type:"D"}
            ]},
            {id:34, text:"女性穿着暴露被骚扰，责任在：", options:[
                {text:"A. 100%在骚扰者，法律必须严惩。", type:"A"},
                {text:"B. 在骚扰者，但社会也应反思对女性的长期物化教育。", type:"B"},
                {text:"C. 责任在骚扰者，但也反映了公共安全和性别隔离的问题。", type:"C"},
                {text:"D. 责任在骚扰者，但女性需要掌握更多自我防御的技能和意识。", type:"D"}
            ]},
            {id:35, text:"跨性别议题对你来说：", options:[
                {text:"A. 尊重个人选择，追求权利平等是所有人的共识。", type:"A"},
                {text:"B. 需谨慎对待，要确保这不会侵蚀传统女性的安全边界。", type:"B"},
                {text:"C. 压迫是相通的，所有被父权制边缘化的群体应站在一起。", type:"C"},
                {text:"D. 性别本来就是流动的，不应被简单的二元论束缚。", type:"D"}
            ]},
            {id:36, text:"关于“温柔”“善解人意”：", options:[
                {text:"A. 这是女性的优良美德，不应被女性主义全盘否定。", type:"A"},
                {text:"B. 被污名化的词汇，往往被用来道德绑架，我持保留态度。", type:"B"},
                {text:"C. 它是社会化的产物，女性可以拥有它，但不应是必须。", type:"C"},
                {text:"D. 温柔是一种强大的选择权，我选择对谁温柔。", type:"D"}
            ]},
            {id:37, text:"老板说“这个项目让小尹负责，她细心”，你的反应：", options:[
                {text:"A. 被认可了很开心，细心确实是我的工作优势。", type:"A"},
                {text:"B. 警惕这种性别标签，我会强调我的专业能力和决策力。", type:"B"},
                {text:"C. 观察这是否意味着我被安排了更多琐碎但不出彩的工作。", type:"C"},
                {text:"D. 接下项目，并展示出不仅细心、更有统筹全局的领袖气场。", type:"D"}
            ]}
        ];

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({ A:0, B:0, C:0, D:0 });
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const radarRef = useRef(null);
            const chartRef = useRef(null);
            const captureRef = useRef(null);

            const handleAnswer = (type) => {
                const newScores = {...scores};
                newScores[type] = (newScores[type] || 0) + 1;
                setHistory([...history, {scores, currentQuestion}]);
                setScores(newScores);

                if (currentQuestion < QUESTIONS.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    const topType = Object.keys(newScores).reduce((a,b) => newScores[a] > newScores[b] ? a : b);
                    setResult(ARCHETYPES[topType]);
                    setStep('result');
                }
            };

            const handleBack = () => {
                if (history.length > 0) {
                    const last = history[history.length-1];
                    setScores(last.scores);
                    setCurrentQuestion(last.currentQuestion);
                    setHistory(history.slice(0,-1));
                } else setStep('welcome');
            };

            const handleRestart = () => {
                setStep('welcome');
                setCurrentQuestion(0);
                setScores({ A:0, B:0, C:0, D:0 });
                setHistory([]);
                setResult(null);
            };

            useEffect(() => {
                if (step === 'result' && result && radarRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarRef.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['自由主义', '激进主义', '社会主义', '后现代/存在主义'],
                            datasets: [{ data: result.stats, backgroundColor: 'rgba(214,138,159,0.12)', borderColor: result.color, borderWidth: 3 }]
                        },
                        options: { scales: { r: { min:0, max:100, ticks:{display:false} } }, plugins: { legend: { display: false } } }
                    });
                }
            }, [step, result]);

            // 欢迎页：图案向下移动，按钮在其下方
            if (step === 'welcome') {
                return React.createElement('div', {className:"min-h-screen flex flex-col items-center text-center px-6 relative"},
                    React.createElement('div', {className:"abstract-lines"}),
                    React.createElement('div', {className:"title-line1 mb-3 mt-12"}, "寻找你的"),
                    React.createElement('div', {className:"title-line2 mb-12"}, "女性主义精神坐标"),
                    React.createElement('button', {
                        onClick: () => setStep('quiz'),
                        className:"start-btn mt-auto mb-8"
                    }, "开始探索")
                );
            }

            // 测试页
            if (step === 'quiz') {
                return React.createElement('div', {className:"relative"},
                    React.createElement('div', {className:"page-number"}, `${currentQuestion + 1}/${QUESTIONS.length}`),
                    React.createElement('h2', {className:"question-title"}, QUESTIONS[currentQuestion].text),
                    React.createElement('div', {className:"space-y-4 mt-8"},
                        QUESTIONS[currentQuestion].options.map((opt, i) =>
                            React.createElement('button', {
                                key: i,
                                onClick: () => handleAnswer(opt.type),
                                className:"option-btn text-left text-[17px]"
                            }, opt.text)
                        )
                    ),
                    React.createElement('div', {className:"footer-logo"},
                        React.createElement('div', {className:"top"}, "Tropical Poetry Collection"),
                        React.createElement('div', {className:"middle"}, "热带诗集"),
                        React.createElement('div', {className:"bottom"}, "枝探天际，自成宇宙")
                    )
                );
            }

            // 结果页（无白底框）
            if (step === 'result' && result) {
                return React.createElement('div', {ref: captureRef, className:"max-w-[420px] mx-auto px-6 py-12"},
                    React.createElement('div', {className:"text-center mb-10"},
                        React.createElement('div', {className:"title-line1"}, "你的女性主义精神坐标"),
                        React.createElement('h2', {className:"text-4xl font-light mt-3 text-[#d68a9f]"}, result.name),
                        React.createElement('p', {className:"text-[#d68a9f] mt-1 text-lg"}, result.type)
                    ),
                    React.createElement('div', {className:"p-8"},
                        React.createElement('canvas', {ref: radarRef})
                    ),
                    React.createElement('div', {className:"mt-12 px-4"},
                        React.createElement('p', {className:"italic text-xl leading-relaxed"}, `"${result.quote}"`),
                        React.createElement('div', {className:"mt-10"},
                            React.createElement('h4', {className:"font-bold text-lg mb-4 text-[#d68a9f]"}, "详细解析"),
                            React.createElement('p', {className:"text-[15px] leading-relaxed"}, result.detailed)
                        ),
                        React.createElement('div', {className:"mt-12"},
                            React.createElement('h4', {className:"font-bold text-lg mb-4 text-[#d68a9f]"}, "推荐阅读与观影"),
                            React.createElement('div', {className:"space-y-6 text-sm"},
                                React.createElement('div', {},
                                    React.createElement('p', {className:"font-medium"}, "文学作品"),
                                    React.createElement('ul', {className:"mt-3 space-y-1"}, 
                                        result.books.map(b => React.createElement('li', {key:b}, "• " + b))
                                    )
                                ),
                                React.createElement('div', {},
                                    React.createElement('p', {className:"font-medium"}, "电影作品"),
                                    React.createElement('ul', {className:"mt-3 space-y-1"}, 
                                        result.movies.map(m => React.createElement('li', {key:m}, "• " + m))
                                    )
                                )
                            )
                        )
                    ),
                    React.createElement('div', {className:"flex justify-center mt-16"},
                        React.createElement('button', {
                            onClick: handleRestart,
                            className:"restart-btn px-16 py-6"
                        }, "重新开始")
                    ),
                    React.createElement('div', {className:"footer-logo"},
                        React.createElement('div', {className:"top"}, "Tropical Poetry Collection"),
                        React.createElement('div', {className:"middle"}, "热带诗集"),
                        React.createElement('div', {className:"bottom"}, "枝探天际，自成宇宙")
                    )
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
